<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a1a"/>
      <stop offset="100%" style="stop-color:#0e0e0e"/>
    </linearGradient>
    <linearGradient id="goldGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f0c040"/>
      <stop offset="100%" style="stop-color:#c8922a"/>
    </linearGradient>
    <linearGradient id="globeGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#3a3a3a"/>
      <stop offset="100%" style="stop-color:#222222"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="4" result="coloredBlur"/>
      <feMerge><feMergeNode in="coloredBlur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="coinGlow">
      <feGaussianBlur stdDeviation="8" result="coloredBlur"/>
      <feMerge><feMergeNode in="coloredBlur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <clipPath id="circleClip">
      <circle cx="256" cy="256" r="210"/>
    </clipPath>
  </defs>

  <!-- Background rounded rect -->
  <rect width="512" height="512" rx="112" ry="112" fill="url(#bgGrad)"/>

  <!-- Subtle border -->
  <rect width="512" height="512" rx="112" ry="112" fill="none" stroke="#2a2a2a" stroke-width="2"/>

  <!-- Globe base circle -->
  <circle cx="230" cy="265" r="155" fill="url(#globeGrad)" stroke="#3a3a3a" stroke-width="2"/>

  <!-- Globe latitude lines -->
  <g clip-path="url(#circleClip)" opacity="0.35">
    <ellipse cx="230" cy="265" rx="155" ry="48" fill="none" stroke="#d4a843" stroke-width="1.5"/>
    <ellipse cx="230" cy="205" rx="130" ry="38" fill="none" stroke="#d4a843" stroke-width="1"/>
    <ellipse cx="230" cy="325" rx="130" ry="38" fill="none" stroke="#d4a843" stroke-width="1"/>
    <ellipse cx="230" cy="155" rx="80" ry="24" fill="none" stroke="#d4a843" stroke-width="1"/>
    <ellipse cx="230" cy="375" rx="80" ry="24" fill="none" stroke="#d4a843" stroke-width="1"/>
  </g>

  <!-- Globe longitude lines -->
  <g clip-path="url(#circleClip)" opacity="0.35">
    <ellipse cx="230" cy="265" rx="48" ry="155" fill="none" stroke="#d4a843" stroke-width="1.5"/>
    <ellipse cx="230" cy="265" rx="110" ry="155" fill="none" stroke="#d4a843" stroke-width="1"/>
  </g>

  <!-- Globe outline -->
  <circle cx="230" cy="265" r="155" fill="none" stroke="#4a4a4a" stroke-width="2.5"/>

  <!-- Gold coin — overlapping bottom-right of globe -->
  <circle cx="340" cy="340" r="88" fill="#1a1200" filter="url(#coinGlow)"/>
  <circle cx="340" cy="340" r="82" fill="url(#goldGrad)"/>
  <circle cx="340" cy="340" r="70" fill="none" stroke="#c8922a" stroke-width="3" opacity="0.6"/>

  <!-- Dollar sign on coin -->
  <text x="340" y="358" font-family="-apple-system, 'SF Pro Display', Arial, sans-serif"
        font-size="68" font-weight="800" text-anchor="middle"
        fill="#1a0f00" opacity="0.85">$</text>

  <!-- Coin shine highlight -->
  <ellipse cx="322" cy="318" rx="22" ry="14" fill="white" opacity="0.18" transform="rotate(-35 322 318)"/>

  <!-- Top-right arrow (flip/flip indicator) -->
  <g transform="translate(338, 118) rotate(45)" opacity="0.9" filter="url(#glow)">
    <line x1="0" y1="0" x2="44" y2="0" stroke="#d4a843" stroke-width="4" stroke-linecap="round"/>
    <line x1="0" y1="0" x2="0" y2="44" stroke="#d4a843" stroke-width="4" stroke-linecap="round"/>
    <polyline points="44,0 44,44 0,44" fill="none" stroke="#d4a843" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/>
  </g>
</svg>
